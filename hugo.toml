baseURL = 'https://snow-blower.ca/'
languageCode = 'en-CA'
title = 'Tempête is the authorized distributor of Radtech parts and products (www.radtech.ca). We are proud to sell excellent products manufactured in the Chaudière-Appalaches region, and at excellent prices.'

# No theme - using custom layouts

# Canonical permalinks with categories
[permalinks]
  manuels = '/manuals/:slug/'
  produits = '/products/:slug/'
  usage = '/used/:slug/'

# Taxonomies to organize manuals
[taxonomies]
  categorie = 'categories'
  marque = 'brands'
  type = 'types'

# Site parameters
[params]
  author = "Tempête"
  description = "Tempête is the authorized distributor of Radtech parts and products (www.radtech.ca). We are proud to sell excellent products manufactured in the Chaudière-Appalaches region, and at excellent prices."
  phone = "(418) 478-2118"
  email = "david@tempete.ca"
  address = "Thetford Mines"
  hours = "Mon-Fri: 8am-5pm"
  
  # Search configuration
  [params.search]
    enabled = true
    
  # Social media
  [params.social]
    facebook = "https://www.facebook.com/tempete.ca"

# Main menu
[menu]
  [[menu.main]]
    identifier = "produits"
    name = "Products"
    url = "/products/"
    weight = 10
    
  [[menu.main]]
    identifier = "usage"
    name = "Used Equipment"
    url = "/used/"
    weight = 20

  [[menu.main]]
    identifier = "manuels"
    name = "Manuals"
    url = "/manuals/"
    weight = 30

  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 40

# Configuration for GitHub Pages
[imaging]
  quality = 85
  resampleFilter = "lanczos"

# Security
[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^GITHUB_']

# Multilingual (optional)
[languages]
  [languages.fr]
    weight = 1
    title = "Tempête"
    languageName = "Français"
  [languages.en]
    weight = 2
    title = "Tempête"
    languageName = "English"
